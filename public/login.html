<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Creatrix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3a;
      --text: #e4e4ef;
      --text-dim: #8888a0;
      --accent: #7c5cfc;
      --accent-glow: rgba(124,92,252,0.25);
      --google: #4285f4;
      --github: #f0f0f0;
      --radius: 12px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 20%, rgba(124,92,252,0.08), transparent),
        radial-gradient(ellipse 500px 500px at 80% 80%, rgba(99,72,234,0.06), transparent);
      pointer-events: none;
    }
    .login-container {
      position: relative;
      width: 100%; max-width: 420px;
      padding: 2rem;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      text-align: center;
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #7c5cfc, #b06cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .tagline {
      color: var(--text-dim);
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }
    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.5rem 0;
      color: var(--text-dim);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }
    .oauth-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 14px 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem; font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      margin-bottom: 1rem;
    }
    .oauth-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .oauth-btn.google {
      background: var(--google);
      color: #fff;
      border-color: var(--google);
    }
    .oauth-btn.google:hover { background: #3574e2; }
    .oauth-btn.github {
      background: var(--surface2);
      color: var(--text);
    }
    .oauth-btn.github:hover { background: #222233; }
    .oauth-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
    .footer-text {
      margin-top: 2rem;
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.6;
    }
    .footer-text a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer-text a:hover { text-decoration: underline; }
    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--text-dim);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">Creatrix</div>
      <p class="tagline">Turn your content into your income.</p>

      <a href="/auth/google" class="oauth-btn google">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#fff"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff"/><path d="M5.84 14.09A6.97 6.97 0 0 1 5.48 12c0-.73.13-1.43.36-2.09V7.07H2.18A11 11 0 0 0 1 12c0 1.78.43 3.46 1.18 4.93l3.66-2.84z" fill="#fff"/><path d="M12 5.38a5.95 5.95 0 0 1 4.21 1.64l3.15-3.15A10.6 10.6 0 0 0 12 1C7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#fff"/></svg>
        Continue with Google
      </a>

      <div class="divider">or</div>

      <a href="/auth/github" class="oauth-btn github">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.37.5 0 5.78 0 12.292c0 5.211 3.438 9.63 8.205 11.188.6.111.82-.254.82-.567 0-.28-.01-1.022-.015-2.005-3.338.711-4.042-1.582-4.042-1.582-.546-1.361-1.333-1.723-1.333-1.723-1.089-.731.083-.716.083-.716 1.205.082 1.838 1.215 1.838 1.215 1.07 1.803 2.809 1.282 3.495.98.108-.763.417-1.282.76-1.577-2.665-.295-5.466-1.309-5.466-5.827 0-1.287.465-2.339 1.228-3.164-.123-.297-.533-1.497.117-3.12 0 0 1.001-.314 3.28 1.209A11.5 11.5 0 0 1 12 6.32c1.014.005 2.034.134 2.988.394 2.277-1.523 3.276-1.209 3.276-1.209.652 1.623.242 2.823.119 3.12.765.825 1.226 1.877 1.226 3.164 0 4.53-2.805 5.527-5.475 5.817.43.364.823 1.08.823 2.177 0 1.572-.014 2.84-.014 3.227 0 .315.216.683.825.567C20.565 21.917 24 17.5 24 12.292 24 5.78 18.627.5 12 .5z"/></svg>
        Continue with GitHub
      </a>

      <p class="footer-text">
        By signing in, you agree to our <a href="#">Terms of Service</a>
        and <a href="#">Privacy Policy</a>.
      </p>

      <a href="/" class="back-link">← Back to home</a>
    </div>
  </div>
</body>
</html>
